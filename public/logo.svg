<svg width="128" height="128" viewBox="0 0 96 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White Playing Card Body -->
  <rect x="2" y="2" width="92" height="116" rx="10" fill="#ECECF4" stroke="#D1D5DB" stroke-width="2.5"/>
  <rect x="5" y="5" width="86" height="110" rx="8" stroke="#F3F4F6" stroke-width="1" fill="none"/>

  <!-- Center Joker Head -->
  <g transform="translate(48, 60)">
    <!-- Jester Hat 3 Peaks (Rendered behind head) -->
    <!-- Left Drooping Peak (Pink / Red) -->
    <path d="M-16 0 C-32 -10 -36 -24 -24 -24 C-16 -24 -10 -12 0 0 Z" fill="#EC4899"/>
    <circle cx="-25" cy="-24" r="3.5" fill="#FBBF24"/>

    <!-- Center Tall Peak (Yellow) -->
    <path d="M-7 0 C-6 -30 6 -30 7 0 Z" fill="#FBBF24"/>
    <circle cx="0" cy="-28" r="3.5" fill="#FBBF24"/>

    <!-- Right Drooping Peak (Blue) -->
    <path d="M16 0 C32 -10 36 -24 24 -24 C16 -24 10 -12 0 0 Z" fill="#3B82F6"/>
    <circle cx="25" cy="-24" r="3.5" fill="#FBBF24"/>

    <!-- Face Base (Peach / Skin Tone) -->
    <path transform="translate(0, -2)" d="M-17 4 C-17 28 17 28 17 4 Z" fill="#FCA5A5"/>

    <!-- Purple Headband -->
    <path d="M-18 0 Q0 -6 18 0 L18 6 Q0 0 -18 6 Z" fill="#8B5CF6"/>
  </g>
</svg>
