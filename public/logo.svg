<svg width="128" height="128" viewBox="0 0 96 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White Playing Card -->
  <rect x="2" y="2" width="92" height="116" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
  <rect x="5" y="5" width="86" height="110" rx="8" stroke="#F1F5F9" stroke-width="1" fill="none"/>

  <!-- Top Left Index 'J' -->
  <text x="10" y="22" fill="#DC2626" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900">J</text>

  <!-- Center Modern Joker Head -->
  <g transform="translate(48, 60)">
    <!-- Jester Collar (3 points) -->
    <path d="M-22 12 L-12 26 L0 14 L12 26 L22 12 Z" fill="#7C3AED"/>

    <!-- Face Base -->
    <path d="M-18 2 C-18 22 18 22 18 2 Z" fill="#FDE047"/>
    
    <!-- Minimalist Eyes & Smile -->
    <circle cx="-6" cy="8" r="2.2" fill="#1E293B"/>
    <circle cx="6" cy="8" r="2.2" fill="#1E293B"/>
    <path d="M-8 14 Q0 20 8 14" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Jester Hat 3 Peaks -->
    <!-- Left Peak (Red) -->
    <path d="M-18 2 C-30 -16 -10 -24 -5 -7 Z" fill="#DC2626"/>
    <circle cx="-23" cy="-19" r="3.5" fill="#F59E0B"/>

    <!-- Center Peak (Gold) -->
    <path d="M-7 2 C-5 -28 5 -28 7 2 Z" fill="#F59E0B"/>
    <circle cx="0" cy="-25" r="3.5" fill="#F59E0B"/>

    <!-- Right Peak (Blue) -->
    <path d="M18 2 C30 -16 10 -24 5 -7 Z" fill="#2563EB"/>
    <circle cx="23" cy="-19" r="3.5" fill="#F59E0B"/>
  </g>

  <!-- Bottom Right Index 'J' (Inverted) -->
  <g transform="translate(86, 98) rotate(180)">
    <text x="0" y="0" fill="#DC2626" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900">J</text>
  </g>
</svg>
