kind = "web"
previewPath = "/"
title = "Poker Party"
version = "1.0.0"
id = "artifacts/poker-party"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21978

[services.development]
run = "pnpm --filter @workspace/poker-party run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poker-party", "run", "build" ]
serve = "static"
publicDir = "artifacts/poker-party/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21978"
BASE_PATH = "/"
